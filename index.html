<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QKommand | The Grand Hall</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --accent: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hall-container {
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(10px);
            max-width: 450px;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.8s ease-out;
        }

        .hall-container.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 { font-weight: 300; letter-spacing: 2px; }

        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        a {
            padding: 0.8rem;
            text-decoration: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            transition: 0.3s;
        }

        a:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .secondary-link {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="hall-panel" class="hall-container">
        <h2>THE GRAND HALL</h2>
        <p>A space for the pursuit of knowledge, narrative design, and the guild's daily rhythm.</p>
        
        <div class="cta-group">
            <a href="https://discord.gg/Stk8bCUKDz">Join the Conversation</a>
            <a href="https://qkommand.github.io/home/">Visit Headquarters</a>
        </div>

        <div class="secondary-link" onclick="handleAlternative()">
            Prefer a different frequency?
        </div>
    </div>

    <script>
        // Trigger animation
        window.onload = () => document.getElementById('hall-panel').classList.add('is-visible');

        // Supabase placeholder logic
        function handleAlternative() {
            const email = prompt("Enter your email, and we'll reach out on your preferred channel:");
            if (email) {
                // Logic to push to Supabase table
                console.log("Sending to Supabase:", email);
                alert("Noted. We will be in touch.");
            }
        }
    </script>
</body>
</html>
