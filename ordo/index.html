<!DOCTYPE html>
<html lang="en">
<head>
    <!-- CATEGORY: METADATA & EXTERNAL RESOURCES -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services | Checkout</title>
    
    <style>
        /* CATEGORY: CORE STYLES & VARIABLES */
        :root {
            --bg-obsidian: #0D0D0D;
            --bg-card: #141414;
            --gold-bright: #D4AF37;
            --gold-muted: #AA8C2C;
            --text-main: #FFFFFF;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-obsidian);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        a { color: inherit; text-decoration: none; }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

        /* CATEGORY: NAVIGATION INTERFACE */
        .nav-bar { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(20, 20, 20, 0.95); border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); z-index: 1000; }
        .nav-container { display: flex; justify-content: flex-start; align-items: center; height: 65px; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        .nav-link { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text-main); text-transform: uppercase; transition: color 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .nav-link:hover { color: var(--gold-bright); }

        /* CATEGORY: CHECKOUT ARCHITECTURE WRAPPER */
        .checkout-wrapper { padding-top: 8rem; display: grid; grid-template-columns: 1fr; gap: 3rem; }

        /* CATEGORY: ORDER SUMMARY PANEL */
        .summary-panel { background-color: var(--bg-card); border: 1px solid #1a1a1a; padding: 2.5rem 2rem; border-radius: 4px; height: fit-content; }
        .panel-title { font-size: 1.25rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-bright); margin-bottom: 2rem; border-bottom: 1px solid #222; padding-bottom: 0.75rem; }
        
        .checkout-item { display: flex; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #1a1a1a; }
        .checkout-item:last-of-type { border-bottom: none; margin-bottom: 1rem; padding-bottom: 0; }
        .cover-art { width: 80px; height: 115px; background-color: #1a1a1a; border: 1px solid #222; object-fit: cover; border-radius: 2px; }
        .item-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .item-author { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-top: 0.25rem; }
        .item-price { font-size: 1rem; font-weight: 600; color: var(--gold-bright); margin-top: 0.5rem; }

        .total-breakdown { border-top: 1px solid #222; padding-top: 1.5rem; margin-top: 2rem; }
        .calculation-row { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 0.5rem; color: #888; }
        .calculation-row.final-total { color: var(--text-main); font-size: 1.2rem; font-weight: 700; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed #222; }
        .calculation-row.final-total span:last-child { color: var(--gold-bright); }

        /* CATEGORY: TRANSACTION FORM INTERFACE */
        .transaction-panel { background-color: var(--bg-card); border: 1px solid #1a1a1a; padding: 2.5rem 2rem; border-radius: 4px; }
        .form-section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-bright); margin-bottom: 1.25rem; margin-top: 1.5rem; }
        .form-section-title:first-of-type { margin-top: 0; }
        
        .form-layout { display: flex; flex-direction: column; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.5rem; }
        .form-control { width: 100%; background-color: var(--bg-obsidian); border: 1px solid #222222; color: var(--text-main); padding: 0.8rem; font-family: var(--font-main); font-size: 0.95rem; border-radius: 2px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        /* CATEGORY: BUTTONS & INTERACTION ELEMENTS */
        .btn-gold { display: block; width: 100%; text-align: center; background-color: transparent; border: 1px solid var(--gold-bright); color: var(--gold-bright); padding: 1rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; transition: background-color 0.3s ease, color 0.3s ease; cursor: pointer; margin-top: 1.5rem; border-radius: 2px; }
        .btn-gold:hover { background-color: var(--gold-bright); color: var(--bg-obsidian); }

        footer { text-align: center; padding: 4rem 1.5rem; margin-top: 4rem; border-top: 1px solid #1a1a1a; color: #555; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }

        /* CATEGORY: RESPONSIVE BREAKPOINTS */
        @media (min-width: 768px) {
            .checkout-wrapper { grid-template-columns: 1.1fr 0.9fr; gap: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- CATEGORY: NAVIGATION BACK INTERFACE -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="../published/index.html" class="nav-link">
                &#8592; Back
            </a>
        </div>
    </nav>

    <!-- CATEGORY: CHECKOUT SYSTEM ENVIRONMENT -->
    <main class="container">
        <div class="checkout-wrapper">
            
            <!-- CATEGORY: TRANSACTION PROCESSING COMPONENT -->
            <div class="transaction-panel">
                <h2 class="panel-title">Secure Checkout</h2>
                <form class="form-layout" onsubmit="return false;">
                    
                    <h3 class="form-section-title">Account Information</h3>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="name@domain.com" disabled>
                    </div>

                    <h3 class="form-section-title">Shipping Credentials</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control" placeholder="John" disabled>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control" placeholder="Doe" disabled>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" class="form-control" placeholder="123 Vanguard Way" disabled>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" class="form-control" placeholder="Metropolis" disabled>
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" class="form-control" placeholder="10001" disabled>
                        </div>
                    </div>

                    <h3 class="form-section-title">Payment Method</h3>
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" disabled>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" class="form-control" placeholder="&#9679;&#9679;&#9679;&#9679; &#9679;&#9679;&#9679;&#9679; &#9679;&#9679;&#9679;&#9679; &#9679;&#9679;&#9679;&#9679;" disabled>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiration Date</label>
                            <input type="text" class="form-control" placeholder="MM / YY" disabled>
                        </div>
                        <div class="form-group">
                            <label>Security Code</label>
                            <input type="password" class="form-control" placeholder="CVV" disabled>
                        </div>
                    </div>

                    <button class="btn-gold">Place Order</button>
                </form>
            </div>

            <!-- CATEGORY: BASKET SUMMARY COMPONENT -->
            <div class="summary-panel">
                <h2 class="panel-title">Review Order</h2>
                
                <!-- PRODUCT UNIT: 33 TEARS -->
                <div class="checkout-item">
                    <img src="33tearscover.png" alt="33 Tears Book Cover" class="cover-art">
                    <div class="item-details">
                        <h3 class="item-title">33 Tears</h3>
                        <p class="item-author">Written by Quincy Jones</p>
                        <p class="item-price">$24.99</p>
                    </div>
                </div>

                <!-- PRODUCT UNIT: ORDO MINDSET -->
                <div class="checkout-item">
                    <img src="ordomindsetcover.jpg" alt="The Ordo Mindset Book Cover" class="cover-art">
                    <div class="item-details">
                        <h3 class="item-title">The Ordo Mindset</h3>
                        <p class="item-author">Written by Quincy Jones</p>
                        <p class="item-price">$19.99</p>
                    </div>
                </div>

                <!-- CATEGORY: ACCUMULATED VALUES BREAKDOWN -->
                <div class="total-breakdown">
                    <div class="calculation-row">
                        <span>Subtotal</span>
                        <span>$44.98</span>
                    </div>
                    <div class="calculation-row">
                        <span>Shipping</span>
                        <span>$0.00</span>
                    </div>
                    <div class="calculation-row">
                        <span>Tax</span>
                        <span>$0.00</span>
                    </div>
                    <div class="calculation-row final-total">
                        <span>Total Due</span>
                        <span>$44.98</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        &copy; 2026 Vanguard Citizen Services
    </footer>

</body>
</html>
